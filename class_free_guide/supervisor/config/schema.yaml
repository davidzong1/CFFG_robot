# Reward-weight schema for the LLM supervisor.
#
# Each entry declares the allowed range for a reward term. The supervisor
# refuses any patch outside [min, max] and limits per-cycle relative change
# (see SupervisorConfig.max_rel_change).
#
# Defaults below mirror vel_task_cfg.py:261-354 (velocity task).
# Positive rewards: max ≈ 5× current, min ≈ 0.1× current.
# Penalties: max = 0, min ≈ 5× current.

terms:
  track_linear_velocity:
    default: 1.0
    min: 0.1
    max: 5.0
    description: "Linear velocity tracking reward. Primary task signal."
  track_angular_velocity:
    default: 1.0
    min: 0.1
    max: 5.0
    description: "Angular velocity tracking reward."
  body_orientation_l2:
    default: -1.0
    min: -5.0
    max: 0.0
    description: "Penalty for body tilt away from upright (body_names set per-robot)."
  pose:
    default: 1.0
    min: 0.0
    max: 5.0
    description: "Variable-posture reward with speed-dependent std tolerances (stand/walk/run)."
  body_ang_vel:
    default: -0.05
    min: -0.25
    max: 0.0
    description: "Penalty on body angular velocity (body_names set per-robot)."
  angular_momentum:
    default: -0.025
    min: -0.125
    max: 0.0
    description: "Penalty on whole-body angular momentum."
  is_terminated:
    default: -200.0
    min: -1000.0
    max: 0.0
    description: "Penalty on early episode termination (fall/timeout)."
  joint_acc_l2:
    default: -2.5e-7
    min: -1.25e-6
    max: 0.0
    description: "Joint acceleration L2 penalty for motion smoothness."
  joint_pos_limits:
    default: -10.0
    min: -50.0
    max: 0.0
    description: "Penalty for approaching joint position limits."
  action_rate_l2:
    default: -0.05
    min: -0.25
    max: 0.0
    description: "Penalty on action change rate for temporal smoothness."
  foot_gait:
    default: 0.5
    min: 0.05
    max: 2.5
    description: "Bonus for matching the prescribed trot gait pattern (period=0.6s)."
  foot_clearance:
    default: -1.0
    min: -5.0
    max: 0.0
    description: "Penalty for incorrect swing-foot height (target=0.10m, gated by command)."
  foot_slip:
    default: -0.25
    min: -1.25
    max: 0.0
    description: "Penalty for foot sliding while in contact (gated by command)."
  soft_landing:
    default: -0.001
    min: -0.005
    max: 0.0
    description: "Penalty for high foot impact forces at touchdown (gated by command)."
  stand_still:
    default: -1.0
    min: -5.0
    max: 0.0
    description: "Penalty for joint deviation when zero-velocity command is issued."
